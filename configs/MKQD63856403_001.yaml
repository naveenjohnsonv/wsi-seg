paths:
  slide_path: data/slides/MKQD63856403_001.mrxs
  model_path: data/model_scripted.pt
  output_dir: outputs

model:
  target_mpp: 0.88
  patch_px: 512
  stride_px: 384
  halo_px: 64
  batch_size: 8
  threshold: 0.5
  apply_sigmoid: true

runtime:
  device: auto
  use_amp: true
  openslide_cache_bytes: 536870912
  torch_num_threads: 1

output:
  write_tiff: true
  bigtiff: true
  compression: null
  preview_max_size: 1536
  keep_memmap: true

schedule:
  use_bounds: true
  use_tissue_mask: true
  tissue_mask_max_size: 1536
  tissue_mask_min_fraction: 0.03
  tissue_mask_saturation_threshold: 18
  tissue_mask_white_threshold: 235
  supertile_px: 4096
