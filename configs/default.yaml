slide:
  mpp_override_x: null
  mpp_override_y: null

model:
  target_mpp: 0.88
  patch_px: 512
  stride_px: 384
  halo_px: 64
  batch_size: 8
  threshold: 0.5
  apply_sigmoid: true
  level_selection_policy: prefer_higher_bounded  # nearest | prefer_higher | prefer_higher_bounded
  max_native_oversample_factor: 2.0

runtime:
  device: auto  # auto | cuda | cuda:N | xpu | xpu:N | mps | cpu
  use_amp: true
  openslide_cache_bytes: 536870912
  torch_num_threads: 1
  prefetch_supertiles: true
  prefetch_queue_size: 6
  log_every_supertiles: 8

output:
  write_tiff: false
  bigtiff: true
  compression: zlib
  tiff_tile_size: 512
  write_ome_tiff: true
  ome_tile_size: 512
  ome_pyramid_min_size: 512
  write_previews: true
  preview_max_size: 1536
  keep_memmap: false

schedule:
  use_bounds: true
  use_tissue_mask: true
  tissue_mask_max_size: 1536
  tissue_mask_min_fraction: 0.03
  tissue_mask_saturation_threshold: 18
  tissue_mask_white_threshold: 235
  supertile_px: 4096
